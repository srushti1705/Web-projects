<!DOCTYPE html>
<html>
<head>
  <title>Light Switch</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="bg-[#0b0b0b] min-h-screen flex flex-col justify-center items-center">
        <div>
            <img id="bulbImage" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/bulb-go-on-img.png" class="w-[150px]" />
        </div>
        <div>
            <img id="catImage" src="https://d2clawv67efefq.cloudfront.net/ccbp-dynamic-webapps/cat-img.png" class="w-[300px]" />
        </div>
        <div class="pt-5 text-center">
            <div class="bg-[#7b8794] w-[294px] rounded-xl p-6 m-4">
                <h1 id="switchStatus" class="text-white font-roboto text-2xl font-medium mb-6">
                    Switched On
                </h1>
                <button id="offSwitch" onclick="switchOff()" class="w-[99px] h-11 rounded-lg bg-[#e12d39] text-white font-roboto text-2xl font-bold">
                    OFF
                </button>
                <button id="onSwitch" onclick="switchOn()" class="w-[99px] h-11 rounded-lg bg-[#cbd2d9] text-white font-roboto text-2xl font-bold ml-4">
                    ON
                </button>
            </div>
        </div>
    </div>
    <script src="index.js"></script>
</body>
</html>
